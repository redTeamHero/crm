<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Affiliate Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/tour-guide.css">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/evolv-dark.css">
  <script src="/sidebar.js" defer></script>
  <script src="/command-palette.js" defer></script>
</head>
<body>
<header id="host-nav" class="p-4">
  <div class="max-w-7xl mx-auto glass card nav-shell">
    <div class="nav-brand-row">
      <div class="text-xl font-semibold">Metro 2 CRM</div>
      <button id="navToggle" class="btn md:hidden" type="button" aria-expanded="false" aria-controls="primaryNav">
        <span>Menu</span>
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <nav id="primaryNav" class="hidden flex-col gap-2 md:flex md:flex-row md:items-center md:gap-2">
      <div id="primaryNavLinks" class="flex flex-col md:flex-row md:items-center gap-2 w-full md:w-auto"></div>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold">Affiliate Management</h1>
      <p class="text-sm text-gray-400 mt-1">View and manage affiliate pricing and commissions</p>
    </div>
  </div>

  <div id="affEmpty" class="hidden text-center py-16">
    <div style="font-size:48px;margin-bottom:16px;">🔗</div>
    <h2 class="text-xl font-semibold mb-2">No Affiliates Yet</h2>
    <p class="text-gray-400">When users join the affiliate program, they will appear here.</p>
  </div>

  <div id="affLoading" class="text-center py-16">
    <div class="text-gray-400">Loading affiliates...</div>
  </div>

  <div id="affTable" class="hidden">
    <div class="glass card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-gray-400 border-b border-white/10">
              <th class="p-3">Affiliate</th>
              <th class="p-3">Ref Code</th>
              <th class="p-3 text-center">Clicks</th>
              <th class="p-3 text-center">Signups</th>
              <th class="p-3 text-right">Earned</th>
              <th class="p-3 text-right">Balance</th>
              <th class="p-3 text-center">Client Price</th>
              <th class="p-3 text-center">Commission</th>
              <th class="p-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="affTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="/common.js"></script>
<script src="/affiliates-admin.js"></script>
</body>
</html>
